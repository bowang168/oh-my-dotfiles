# Kitty config - Ghostty macOS style (Cmd → Alt for Linux)
# Reload: alt+shift+,

# ── Appearance ──────────────────────────────────────
font_family      Maple Mono NF
bold_font        Maple Mono NF Bold
italic_font      Maple Mono NF Italic
bold_italic_font Maple Mono NF Bold Italic
font_size 14.0

# Chinese fallback (霞鹜文楷等宽)
# CJK Unified Ideographs + Extensions
symbol_map U+4E00-U+9FFF,U+3400-U+4DBF,U+F900-U+FAFF    LXGW WenKai Mono
# CJK punctuation + symbols
symbol_map U+3000-U+303F,U+FF00-U+FFEF                    LXGW WenKai Mono
# CJK Compatibility Ideographs Supplement
symbol_map U+2F800-U+2FA1F                                 LXGW WenKai Mono
confirm_os_window_close 0
enabled_layouts splits,stack

# ── Copy & Paste (Ghostty: cmd+c/v → alt+c/v) ──────
# Keep ctrl+shift+c/v as well since alt+c/v may conflict with shell
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map shift+insert        paste_from_selection

# ── Split Management ────────────────────────────────
# Ghostty: cmd+d = split right, cmd+shift+d = split down
map alt+d               launch --location=vsplit --cwd=current
map alt+shift+d         launch --location=hsplit --cwd=current

# Focus splits: cmd+[/] → alt+[/]
map alt+]               next_window
map alt+[               previous_window

# Focus splits by direction: cmd+opt+arrow → alt+ctrl+arrow
map alt+ctrl+up         neighboring_window up
map alt+ctrl+down       neighboring_window down
map alt+ctrl+left       neighboring_window left
map alt+ctrl+right      neighboring_window right

# Toggle split zoom: cmd+shift+enter → alt+shift+enter
map alt+shift+enter     toggle_layout stack

# Resize splits: cmd+ctrl+arrow → ctrl+super+arrow
map ctrl+super+up       resize_window taller 2
map ctrl+super+down     resize_window shorter 2
map ctrl+super+left     resize_window narrower 2
map ctrl+super+right    resize_window wider 2

# Close split: cmd+w → alt+w
map alt+w               close_window

# ── Tab Management ──────────────────────────────────
# Ghostty: cmd+t → alt+t
map alt+t               new_tab_with_cwd

# Ghostty: cmd+shift+]/[ → alt+shift+]/[
map alt+shift+]         next_tab
map alt+shift+[         previous_tab

# Go to tab by number: cmd+1~8 → alt+1~8, alt+9 = last
map alt+1               goto_tab 1
map alt+2               goto_tab 2
map alt+3               goto_tab 3
map alt+4               goto_tab 4
map alt+5               goto_tab 5
map alt+6               goto_tab 6
map alt+7               goto_tab 7
map alt+8               goto_tab 8
map alt+9               goto_tab -1

# ── Window Management ──────────────────────────────
# Ghostty: cmd+n → alt+n
map alt+n               new_os_window_with_cwd
map alt+shift+w         close_os_window
map alt+q               quit

# Fullscreen: cmd+enter → alt+enter
map alt+enter           toggle_fullscreen

# ── Scrolling ──────────────────────────────────────
map shift+page_up       scroll_page_up
map shift+page_down     scroll_page_down
map shift+home          scroll_home
map shift+end           scroll_end

# ── Font Size (Ghostty: cmd+=/- → alt+=/-) ────────
map alt+equal           change_font_size all +1.0
map alt+plus            change_font_size all +1.0
map alt+minus           change_font_size all -1.0
map alt+0               change_font_size all 0

# ── Config ─────────────────────────────────────────
# Ghostty: cmd+, → alt+,  cmd+shift+, → alt+shift+,
map alt+comma           edit_config_file
map alt+shift+comma     load_config_file

# ── Clear screen (Ghostty: cmd+k → alt+k) ─────────
map alt+k               clear_terminal scrollback active
